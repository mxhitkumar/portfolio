{% extends "base.html" %}

{% block content %}
<h1>Blogs</h1>
<ul class="post-list">
  {% for post in posts %}
    <li>
      <div class="post-row">
        <span class="date">{{ post.published_at|date:"M j, Y" }}</span>
        <a href="{{ post.get_absolute_url }}">{{ post.title }}</a>
      </div>
    </li>
  {% empty %}
    <li>Add blog posts in Admin.</li>
  {% endfor %}
</ul>
{% endblock %}
